    <title>Exercise 1 — Color-Space Point-Cloud Visualization</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }
      #container {
        width: 100%;
        height: 100%;
      }

  <body>
    <div id="container"></div>
    <script type="x-shader/x-vertex" id="shaderConversions">
      vec3 srgbToLinear(vec3 c) {
        vec3 low = c/12.92;
        vec3 high = pow((c+0.055)/1.055, vec3(2.4));

        // step(edge, x): returns 0.0 when x < edge, 1.0 otherwise — per channel.
        // mix(a, b, 0.0) = a  →  low branch selected  (c ≤ 0.04045)
        // mix(a, b, 1.0) = b  →  high branch selected (c > 0.04045)
        return mix(low, high, step(vec3(0.04045), c));

      }

      vec3 rgb2hsv(vec3 c) {
        //c = srgbToLinear(c); //convert to RGB
        float Cmax  = max(c.r, max(c.g, c.b));
        float Cmin  = min(c.r, min(c.g, c.b));
        float Delta = Cmax - Cmin;

        float V = Cmax;
        float S = (Cmax < 1e-6) ? 0.0 : Delta / Cmax; // approximation of zero.

        float H = 0.0; // default (delta =0)
        if (Delta > 1e-6) { //delta non-zero
          if      (Cmax == c.r) { H = 60.0 * mod((c.g - c.b) / Delta, 6.0); } //60*6 = 360, so mod by 6 to wrap hue around [0,360]
          else if (Cmax == c.g) { H = 60.0 * ((c.b - c.r) / Delta + 2.0);   }
          else                  { H = 60.0 * ((c.r - c.g) / Delta + 4.0);   }
          H /= 360.0; // normalise degrees → [0, 1]
        }

        return vec3(H, S, V);
      }


      vec3 rgb2xyz(vec3 rgb) {
        vec3 linear = srgbToLinear(rgb);

        mat3 m = mat3(
          0.4124564, 0.2126729, 0.0193339,
          0.3575761, 0.7151522, 0.1191920,
          0.1804375, 0.0721750, 0.9503041
        );  // arranged in column-major order: read down each column, not across rows for X, Y, Z

        return m * linear;
      }

      vec3 xyz2xyY(vec3 xyz) {
        float sum = xyz.x + xyz.y+xyz.z;
        if(sum <1e-6) return vec3(0.0); //edge case of division by zero
        float xc = xyz.x/sum;
        float yc = xyz.y/sum;
        // Y=Y
        return vec3(xc,yc,xyz.y);
      }

      float labF(float t){
        float delta = 6.0/29.0;
        float deltaCube = delta * delta * delta;
        return t > deltaCube ? pow(t, 1.0/3.0) : (t/(3.0 * delta * delta) + (4.0/29.0));
      }
      vec3 xyz2lab(vec3 xyz) {
        //define D65 white
        const float Xn = 0.95047;
        const float Yn = 1.00000;
        const float Zn = 1.08883;

        float fx = labF(xyz.x/Xn);
        float fy = labF(xyz.y/Yn);
        float fz = labF(xyz.z/Zn);

        float L = 116.0 * fy -16.0;
        float a = 500.0 * (fx-fy);
        float b = 200.0 * (fy-fz);

        return vec3(L, a, b);
      }

      vec3 lab2lch(vec3 lab) {
        //lab.y = a*, lab.z = b*
        float C = length(vec2 (lab.y, lab.z));
        float h = atan(lab.z, lab.y);

        if( h <0.0) h+= 6.28318530; // shift negative angles to [0, 2π] by adding 2π

        // normalize to 0-1
        float hNorm = h/6.28318530;

        return vec3(lab.x,C,hNorm);
      }
    </script>
    <script type="x-shader/x-vertex" id="cloudVertexShader">
      uniform sampler2D pointsTex;
      uniform vec2 texSize;
      uniform int  colorSpaceMode; // 0=RGB 1=HSV 2=CIEXYZ 3=CIExyY 4=CIELAB 5=CIELCH
      uniform float pointSizeBase; // 6.0=direct  14.0=density
      attribute vec2 gridUV;
      varying vec3 vColor;

      void main() {
        vec3 srgb = texture2D(pointsTex, gridUV).rgb;
        vec3 pos;

        if (colorSpaceMode == 0) {
          // RGB: R on x, B on y , G on z
          // ofssets centre to middle of cube and raise above floor plane for the shadow
          pos = vec3(srgb.r - 0.5, srgb.b + 0.25, srgb.g - 0.5);

        } else if (colorSpaceMode == 1) {
          // HSV: H on x, V on y, S on z
          vec3 hsv = rgb2hsv(srgb);
          // offsets: H and S centred in cube, V raised above floor for shadow
          pos = vec3(hsv.x - 0.5, hsv.z + 0.25, hsv.y - 0.5);

        } else if (colorSpaceMode == 2) {
          vec3 xyz = rgb2xyz(srgb);
          // normalize and clamp to 0-1 using D65 white point
          float nx = clamp(xyz.x / 0.95047, 0.0, 1.0);
          float ny = clamp(xyz.y / 1.00000, 0.0, 1.0);
          float nz = clamp(xyz.z / 1.08883, 0.0, 1.0);

          pos = vec3(nx-0.5, ny+0.25, nz- 0.5); // centered and raised from the ground

        } else if (colorSpaceMode == 3) { // CIExyY
          vec3 xyY = xyz2xyY(rgb2xyz(srgb));
          // xyY.x = x-chromaticity [0, ~0.8]  ← vec3 index 0
          // xyY.y = y-chromaticity [0, ~0.8]  ← vec3 index 1
          // xyY.z = Y-luminance    [0,  1.0]  ← vec3 index 2
          pos = vec3(xyY.x - 0.5, xyY.z + 0.25, xyY.y - 0.5); // raised from the ground on the Y axis(luminance => xyY.z)

        } else if (colorSpaceMode == 4) {
          vec3 lab = xyz2lab(rgb2xyz(srgb));
          pos = vec3(
            lab.y / 200.0, // a* → pos.x:  ±100 maps to ±0.5
            (lab.x - 50.0) / 100.0 + 0.75,  // L* → pos.y:  L*=50 lands at cube centre (0.75)
            lab.z / 200.0 // b* → pos.z:  ±100 maps to ±0.5
          );

        } else {
          vec3 lch = lab2lch(xyz2lab(rgb2xyz(srgb)));
          pos = vec3(
            clamp(lch.y /100.0, 0.0, 1.0) -0.5, // C* → x: C*=0 → -0.5 (grey), C*=100 → +0.5 (vivid)
            lch.x / 100.0 + 0.25, // L* → y: L*=0 → 0.25, L*=100 → 1.25. raised from the ground fro the shadows
            lch.z -0.5 // H_norm → z: H=0° → -0.5, H=180° → 0, H=360° → +0.5
          );
        }

        vColor = srgb; // pass raw sRGB to fragment for displaying each point in its original colour
        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = max(pointSizeBase / -mvPos.z, 1.0);
        gl_Position  = projectionMatrix * mvPos;
      }
    </script>

    <script type="x-shader/x-fragment" id="cloudFragmentShader">
      uniform int renderMode; // 0=direct  1=density
      varying vec3 vColor;

      void main() {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;

        if (renderMode == 1) {
          float weight = 1.0 - (dist * 2.0); // linear falloff: 1 at centre, 0 at edge
          if (weight < 0.15) discard;
          gl_FragColor = vec4(vColor * weight, weight * 0.2);
        } else {
          gl_FragColor = vec4(vColor, 1.0);
        }
      }
    </script>

    <script type="x-shader/x-vertex" id="texVertexShader">
      varying vec2 vUv;

      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    </script>

    <script type="x-shader/x-fragment" id="texFragmentShader">
      uniform sampler2D tex;
      varying vec2 vUv;

      void main() {
        gl_FragColor = vec4(texture2D(tex, vUv).rgb, 1.0);
      }
    </script>

    <script type="x-shader/x-vertex" id="shadowVertexShader">
      uniform sampler2D pointsTex;
      uniform int       colorSpaceMode;
      uniform float     shadowY;
      attribute vec2    gridUV;
      varying float     vAlpha;

      void main() {
        vec3 srgb = texture2D(pointsTex, gridUV).rgb;
        vec3 pos;

        if (colorSpaceMode == 1) {
          // HSV: project onto horizontal plane using H and S as x/z
          vec3 hsv = rgb2hsv(srgb);
          pos    = vec3(hsv.x - 0.5, shadowY, hsv.y - 0.5);
          vAlpha = 0.40 * hsv.z; // fade by V  dark colours cast lighter shadows
        } else {
          // Default (RGB and all CIE modes): project using R and G as x/z
          pos    = vec3(srgb.r - 0.5, shadowY, srgb.g - 0.5);
          vAlpha = 0.25 * srgb.b; //fade by b, and lumincance in CIE models
        }

        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = clamp(3.0 * (120.0 / -mvPos.z), 1.5, 4.0); // size falloff for shadow points: closer points are bigger
        gl_Position  = projectionMatrix * mvPos;
      }
    </script>

    <script type="x-shader/x-fragment" id="shadowFragmentShader">
      varying float vAlpha;

      void main() {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;
        gl_FragColor = vec4(0.0, 0.0, 0.0, vAlpha * (1.0 - dist * 2.0)); // black shadwow color, with alpha fading from center to edge linearly
      }
    </script>
