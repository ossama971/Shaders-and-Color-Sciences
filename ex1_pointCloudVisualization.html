<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Color Space Point-Cloud Visualization</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      #container {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <script type="x-shader/x-vertex" id="texVertexShader">
      uniform float time;
      varying vec2 vUv;

      void main()
      {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position.xyz, 1.0);
      }
    </script>

    <script type="x-shader/x-fragment" id="texFragmentShader">
      uniform float time;
      uniform sampler2D tex;
      varying vec2 vUv;

      void main()
      {
        // texture2D linearises the sample automatically because textureForShader
        // is uploaded with colorSpace = THREE.SRGBColorSpace (WebGL sRGB internal
        // format).  The renderer re-encodes the linear output to sRGB via the
        // injected colorspace_fragment chunk, so no manual pow() is needed here.
        vec3 texColor = texture2D(tex, vUv).rgb;
        gl_FragColor = vec4(texColor, 1.0);
      }
    </script>

    <script type="x-shader/x-vertex" id="pointsVertexShader">
      uniform sampler2D pointsTex;
      uniform vec2 texSize;
      uniform int colorSpaceMode; // 0 = RGB, 1 = HSV, etc.
      attribute vec2 gridUV;
      varying vec3 vColor;

      // RGB to HSV conversion (optimized)
      vec3 rgb2hsv(vec3 c) {
        vec4 K = vec4(0.0, -1.0/3.0, 2.0/3.0, -1.0);
        vec4 p = mix(vec4(c.bg, K.wz), vec4(c.gb, K.xy), step(c.b, c.g));
        vec4 q = mix(vec4(p.xyw, c.r), vec4(c.r, p.yzx), step(p.x, c.r));
        float d = q.x - min(q.w, q.y);
        float e = 1.0e-10;
        return vec3(abs(q.z + (q.w - q.y) / (6.0 * d + e)), d / (q.x + e), q.x);
      }

      // Add more conversion functions here:
      // vec3 rgb2lab(vec3 c) { ... }
      // vec3 rgb2ycbcr(vec3 c) { ... }

      void main()
      {
        // Sample texture at grid UV to get RGB color
        vec3 rgbColor = texture2D(pointsTex, gridUV).rgb;

        // Convert to target color space
        vec3 csColor;
        vec3 pos;

        if (colorSpaceMode == 1) {
          // HSV mode
          csColor = rgb2hsv(rgbColor);
          pos = vec3(csColor.x - 0.5, csColor.z + 0.25, csColor.y - 0.5);
        } else {
          // RGB mode (default)
          csColor = rgbColor;
          pos = vec3(csColor.r - 0.5, csColor.b + 0.25, csColor.g - 0.5);
        }
        // Add more color space modes here:
        // else if (colorSpaceMode == 2) { /* LAB */ }

        vColor = rgbColor; // Always pass original RGB for display
        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        // Perspective-correct: ~4 px at default zoom, grows as you move closer.
        gl_PointSize = clamp(10.0 / -mvPosition.z, 1.5, 20.0);
        gl_Position = projectionMatrix * mvPosition;
      }
    </script>

    <script type="x-shader/x-fragment" id="pointsFragmentShader">
      varying vec3 vColor;

      void main()
      {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;
        // vColor is already linear (DataTexture was CPU-linearised on import).
        // The renderer encodes the output to sRGB automatically.
        gl_FragColor = vec4(vColor, 1.0);
      }
    </script>

    <script type="x-shader/x-vertex" id="shadowVertexShader">
      uniform sampler2D pointsTex;
      uniform int colorSpaceMode;
      uniform float shadowY;
      attribute vec2 gridUV;
      varying float vAlpha;

      vec3 rgb2hsv(vec3 c) {
        vec4 K = vec4(0.0, -1.0/3.0, 2.0/3.0, -1.0);
        vec4 p = mix(vec4(c.bg, K.wz), vec4(c.gb, K.xy), step(c.b, c.g));
        vec4 q = mix(vec4(p.xyw, c.r), vec4(c.r, p.yzx), step(p.x, c.r));
        float d = q.x - min(q.w, q.y);
        float e = 1.0e-10;
        return vec3(abs(q.z + (q.w - q.y) / (6.0 * d + e)), d / (q.x + e), q.x);
      }

      void main()
      {
        vec3 rgbColor = texture2D(pointsTex, gridUV).rgb;
        vec3 csColor;
        vec3 pos;

        if (colorSpaceMode == 1) {
          csColor = rgb2hsv(rgbColor);
          pos = vec3(csColor.x - 0.5, shadowY, csColor.y - 0.5);
          vAlpha = 0.15 * csColor.z; // Fade based on V value
        } else {
          csColor = rgbColor;
          pos = vec3(csColor.r - 0.5, shadowY, csColor.g - 0.5);
          vAlpha = 0.15 * csColor.b; // Fade based on height (B value)
        }

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = clamp(3.0 * (120.0 / -mvPosition.z), 1.5, 4.0);
        gl_Position = projectionMatrix * mvPosition;
      }
    </script>

    <script type="x-shader/x-fragment" id="shadowFragmentShader">
      varying float vAlpha;

      void main()
      {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;
        float alpha = vAlpha * (1.0 - dist * 2.0);
        gl_FragColor = vec4(0.0, 0.0, 0.0, alpha);
      }
    </script>

    <script
      async
      src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/",
          "lil-gui": "https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
        }
      }
    </script>
    <script type="module">
      import {
        initExercise1,
        animateExercise1,
      } from "./ex1_pointCloudVisualization.js";

      const app = await initExercise1();
      animateExercise1(app);
    </script>
  </body>
</html>
